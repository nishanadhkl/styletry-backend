# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/styletry_db
spring.datasource.username=styletry_user
spring.datasource.password=styletry123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# App
spring.application.name=styletry-backend
server.port=8080

# JWT
app.jwt.secret=styletry-secret-key-for-jwt-which-must-be-very-long-and-secure-2024
app.jwt.expiration=86400000

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# CORS
app.cors.allowed-origins=http://localhost:3000

spring.security.filter.order=10
logging.level.org.springframework.security=DEBUG